{#include base}
    {#title}Edit Information{/title}
    <main class="content">
        {#form uri:Actors.edit(actor.id)}
            <div>
                <label for="name">Name</label>
                <input type="text" name="name" id="name" value="{actor.name}">
            </div>
            <div>
                <label for="email">Email Address</label>
                <input type="text" name="email" id="email" value="{actor.email}">
            </div>
            <div>
                <label for="note">User Note</label>
                <textarea name="note" id="note" rows="10" cols="50">{actor.note}</textarea>
            </div>
            <button type="submit">Update</button>
        {/form}
    </main>
{/include}

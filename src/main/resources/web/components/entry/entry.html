{#when entry.type}
{#is NOTE}
<article class="note h-entry">
    {#if entry.name}
    <h3>{entry.name}</h3>
    {/}
    {#if entry.summary}
    <p class="summary">{entry.summary}</p>
    {/}
    <div class="e-content">{entry.safeHtmlContent.raw}</div>
    <span>{#profile actor=entry.author type='chip'}{/} &bull; <a class="u-url u-uid" href="{uri:Entries.entry(entry.id)}"><time class="dt-published" datetime="{entry.published}">{entry.published.since}</time></a></span>
</article>
{/}
{/}
